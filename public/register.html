<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
        .error { color: red; text-align: center; }
        .login-link { text-align: center; margin-top: 15px; }
        a { color: #4CAF50; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Регистрация</h2>
        <div id="error" class="error"></div>
        <input type="text" id="last_name" placeholder="Фамилия" required>
        <input type="text" id="first_name" placeholder="Имя" required>
        <input type="text" id="middle_name" placeholder="Отчество">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Пароль" required>
        <button onclick="register()">Зарегистрироваться</button>
        <div class="login-link">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
    </div>

    <script>
        async function register() {
            const last_name = document.getElementById('last_name').value;
            const first_name = document.getElementById('first_name').value;
            const middle_name = document.getElementById('middle_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');
            
            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ last_name, first_name, middle_name, email, password })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                window.location.href = '/login';
            } else {
                errorDiv.textContent = data.error;
            }
        }
    </script>
</body>
</html>
