<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование товара - Админ панель</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #AA7C6A; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        textarea { resize: vertical; min-height: 100px; }
        button { background: #4CAF50; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:hover { background: #45a049; }
        .btn-back { background: #666; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin-products" class="btn-back">← Назад к списку</a>
        <h1>✏️ Редактировать букет</h1>
        
        <div id="loading">Загрузка данных...</div>
        
        <form id="product-form" style="display: none;">
            <label for="name">Название букета *</label>
            <input type="text" id="name" required>
            
            <label for="price">Цена (₽) *</label>
            <input type="number" id="price" required>
            
            <label for="description">Описание</label>
            <textarea id="description"></textarea>
            
            <label for="image">Название файла изображения</label>
            <input type="text" id="image" placeholder="rozy.jpg">
            
            <button type="submit">💾 Сохранить изменения</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        if (!productId) {
            window.location.href = '/admin-products';
        }
        
        let currentProduct = null;
        
        async function loadProduct() {
            try {
                const response = await fetch(`/api/products/${productId}`);
                if (response.ok) {
                    currentProduct = await response.json();
                    document.getElementById('name').value = currentProduct.name;
                    document.getElementById('price').value = currentProduct.price;
                    document.getElementById('description').value = currentProduct.description || '';
                    document.getElementById('image').value = currentProduct.image || '';
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('product-form').style.display = 'block';
                } else {
                    document.getElementById('loading').innerHTML = '<p class="error">❌ Товар не найден</p>';
                }
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p class="error">❌ Ошибка загрузки</p>';
            }
        }
        
        const form = document.getElementById('product-form');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const product = {
                name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value),
                description: document.getElementById('description').value,
                image: document.getElementById('image').value
            };
            
            try {
                const response = await fetch(`/api/products/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(product)
                });
                
                if (response.ok) {
                    messageDiv.innerHTML = '<p class="success">✅ Товар успешно обновлён!</p>';
                    setTimeout(() => {
                        window.location.href = '/admin-products';
                    }, 1500);
                } else {
                    const error = await response.json();
                    messageDiv.innerHTML = '<p class="error">❌ Ошибка: ' + error.error + '</p>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<p class="error">❌ Ошибка при обновлении</p>';
            }
        });
        
        loadProduct();
    </script>
</body>
</html>
